<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — FoodShare</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="margin: 0; overflow-x: hidden;">

    <div class="split-view">
        <div class="split-visual" style="background: var(--gradient-secondary);">
            <div style="position: absolute; top: 28px; left: 28px;">
                <a href="index.html" class="logo">🍽️ FoodShare</a>
            </div>
            <div style="z-index: 10; text-align: center; padding: 40px;" class="animate-fade-up">
                <div style="font-size: 3.5rem; margin-bottom: 20px;">🚀</div>
                <h2 style="font-size: 2.2rem; margin-bottom: 14px; font-family: 'Playfair Display', serif;">Join the
                    Network</h2>
                <p style="font-size: 1rem; max-width: 380px; margin: 0 auto;">Register your organization and start
                    redistributing surplus food intelligently.</p>
            </div>
        </div>

        <div class="split-form">
            <div style="position: absolute; top: 22px; right: 28px;">
                <button onclick="toggleTheme()" class="theme-toggle" title="Toggle Theme">☀️</button>
            </div>

            <div style="max-width: 460px; width: 100%; margin: 0 auto;" class="animate-fade-up delay-1">
                <span class="section-badge"
                    style="background: var(--accent-secondary-light); color: var(--accent-secondary);">✨ New
                    Account</span>
                <h1 style="font-size: 1.8rem; margin-bottom: 24px;">Create Account</h1>

                <form id="registerForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Account Type</label>
                            <select id="role" required>
                                <option value="RESTAURANT">🍳 Restaurant / Donor</option>
                                <option value="NGO">🏛️ NGO / Receiver</option>
                                <option value="ADMIN">⚙️ System Admin</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Organization Name</label>
                            <input type="text" id="name" required placeholder="e.g. Akshaya Patra Foundation">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required placeholder="org@email.com">
                        </div>
                        <div class="form-group">
                            <label>Location Code</label>
                            <input type="text" id="location_code" required placeholder="DEL-110001">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Password</label>
                            <input type="password" id="password" required placeholder="••••••••" minlength="6">
                        </div>
                    </div>
                    <button type="submit" id="regBtn" class="btn"
                        style="width: 100%; margin-top: 6px; padding: 13px; background: var(--gradient-secondary); box-shadow: var(--shadow-glow-purple);">Create
                        Account →</button>
                </form>

                <p style="text-align: center; margin-top: 22px; color: var(--text-muted); font-size: 0.88rem;">
                    Already registered? <a href="login.html"
                        style="color: var(--accent-secondary); text-decoration: none; font-weight: 700;">Sign in →</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>

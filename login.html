<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — FoodShare</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="margin: 0;">

    <div class="split-view">
        <div class="split-visual">
            <div style="position: absolute; top: 28px; left: 28px;">
                <a href="index.html" class="logo">🍽️ FoodShare</a>
            </div>
            <div style="z-index: 10; text-align: center; padding: 40px;" class="animate-fade-up">
                <div style="font-size: 3.5rem; margin-bottom: 20px;">👋</div>
                <h2 style="font-size: 2.2rem; margin-bottom: 14px; font-family: 'Playfair Display', serif;">Welcome Back
                </h2>
                <p style="font-size: 1rem; max-width: 360px; margin: 0 auto;">Sign in to your dashboard and continue
                    making an impact.</p>
            </div>
        </div>

        <div class="split-form">
            <div style="position: absolute; top: 22px; right: 28px;">
                <button onclick="toggleTheme()" class="theme-toggle" title="Toggle Theme">☀️</button>
            </div>

            <div style="max-width: 400px; width: 100%; margin: 0 auto;" class="animate-fade-up delay-1">
                <span class="section-badge"
                    style="background: var(--accent-primary-light); color: var(--accent-primary);">🔐 Secure
                    Login</span>
                <h1 style="font-size: 1.8rem; margin-bottom: 28px;">Sign In</h1>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="you@organization.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="logBtn" class="btn"
                        style="width: 100%; margin-top: 14px; padding: 13px;">Sign In Securely →</button>
                </form>

                <p style="text-align: center; margin-top: 28px; color: var(--text-muted); font-size: 0.88rem;">
                    New here? <a href="register.html"
                        style="color: var(--accent-primary); text-decoration: none; font-weight: 700;">Create an account
                        →</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
